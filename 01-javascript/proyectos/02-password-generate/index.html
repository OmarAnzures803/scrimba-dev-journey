<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&family=Karla:wght@800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <div class="title">
                    <h1><div class="titleg">Generate a </div><span>random password</span></h1>
                    <p>Never use an insecure password again.</p>
                </div>
                <button class="btn-generate" onclick="generarRanPass()">Generate passwords</button>
                <hr class="divider">
                <div class="caract">
                    <p>Numero de caracteres:</p>
                    <input type="number" id="length-input" min="4" max="20" value="15" class="input">
                </div>
                <div class="passwords-container">
                    <div class="password-box">
                        <div class="password-text" id="pass1-el">
                            Example: nfJjy!d....
                        </div>
                        <img src="Copy_alt.png" alt="Copiar">
                    </div>
                    <div class="password-box">
                        <div class="password-text" id="pass2-el">
                            Example: nfJjy!d....
                        </div>
                        <img src="Copy_alt.png" alt="Copiar">
                    </div>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
