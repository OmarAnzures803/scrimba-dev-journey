<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric / Imperial · Unit Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="index.css">   
    <style>
    </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="conversion-card">

      <div class="card-header">
        <div class="header-title">Metric/Imperial Unit Conversion</div>

        <div class="input-number-box">
          <input type="number" class="input-number" value="20" step="any" id="inputValue" aria-label="Valor a convertir">
        </div>

        <button class="convert-btn-wrapper" id="convertBtn" type="button">
          <span class="convert-btn-text">Convert</span>
        </button>
      </div>

      <div class="card-body">

        <div class="result-row">
          <div class="result-card">
            <div class="result-content">
              <div class="result-label">Length (Meter/Feet)</div>
              <div class="result-value" id="lengthResult">20 meters = 65.616 feet | 20 feet = 6.096 meters</div>
            </div>
          </div>
        </div>

        <div class="result-row">
          <div class="result-card">
            <div class="result-content">
              <div class="result-label">Volume (Liters/Gallons)</div>
              <div class="result-value" id="volumeResult">20 liters = 5.283 gallons | 20 gallons = 75.708 liters</div>
            </div>
          </div>
        </div>
       
        <div class="result-row">
          <div class="result-card">
            <div class="result-content">
              <div class="result-label">Mass (Kilograms/Pounds)</div>
              <div class="result-value" id="massResult">20 kilos = 44.092 pounds | 20 pounds = 9.072 kilos</div>
            </div>
          </div>
        </div>

      </div> 
    </div> 
  </div> 
  <script src="index.js"></script>
</body>
</html>
